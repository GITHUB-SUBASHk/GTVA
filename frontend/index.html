<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gesture to Speech</title>
    <link rel="stylesheet" href="/frontend/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
    <script type="module" src="/frontend/script.js"></script>
</head>
<body>
    <header style="margin-bottom: 18px;">
        <h1 style="font-size:2.1em; font-weight:700; color:#222; letter-spacing:1px; margin-bottom:4px;">Gesture to Speech</h1>
        <p style="color:#555; font-size:1em; margin:0;">Interact with gestures and hear instant feedback</p>
    </header>
    <main style="display:flex; flex-direction:column; align-items:center; gap:18px;">
        <section style="display:flex; gap:16px;">
            <video id="webcam" width="320" height="240" autoplay muted playsinline style="border-radius:10px; border:1.5px solid #3a86ff; background:#e9ecef; box-shadow:0 1px 6px rgba(0,0,0,0.07);"></video>
            <canvas id="canvas" width="320" height="240" style="border-radius:10px; border:1.5px solid #43aa8b; background:#f1f3f4; box-shadow:0 1px 6px rgba(0,0,0,0.07);"></canvas>
        </section>
        <p style="font-size:1.15em; margin:8px 0 0 0; color:#222;">Gesture: <span id="gesture" style="font-weight:600; color:#3a86ff;">None</span></p>
        <div id="status" aria-live="polite" style="min-height:22px; color:#43aa8b; font-size:1.08em; margin-top:6px;"></div>
    </main>
</body>
</html>
